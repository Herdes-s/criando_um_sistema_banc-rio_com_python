<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nova Conta</title>
</head>
<body>
  <h2>Criar Conta Bancária</h2>

  {% if mensagem %}
    <p>{{ mensagem }}</p>
  {% endif %}

  <form method="post">
    <input type="text" name="cpf" placeholder="CPF do usuário" required>
    <button type="submit">Criar Conta</button>
  </form>

  <br>
  <a href="/">Voltar</a>
</body>
</html>
